<!DOCTYPE html>
<html lang="en">
    <head>
        <title>
            Questionaire
        </title>
        <link rel="stylesheet" href="Questionaire.css">
    </head>
    <body>
        <header>C</header>
        <nav>
           
            <ul class="navlist">
                <li><a rel="noopener" href="https://en.wikipedia.org/wiki/Home_page">Home</a></li>
                <li><a rel="noopener" href="https://en.wikipedia.org/wiki/Wikipedia:New_account">Register</a></li>
                <li><a rel="noopener" href="https://en.wikipedia.org/wiki/Login">Login</a></li>
                <li><a rel="noopener" href="https://en.wikipedia.org/wiki/Help">Help</a></li>
            </ul>
         </nav>
        <main>
            
            <aside>
            </aside>
            <section>
                <form class="center" novalidate>
                    <label for="Q1">What is your approximate income threshold?:</label>

                        <select name="Q1" id="Q1">
                            <option value="Lower Class">Lower Class</option>
                            <option value="Middle Class">Middle Class</option>
                            <option value="Upper Class">Upper Class</option>
                            <option value="High Upper Class">High Upper Class</option>
                        </select> <br><br>

                        <label for="Q2">How much budget can you allocate?:</label>

                        <select name="Q2" id="Q2">
                            <option value="None">£0</option>
                            <option value="Under">Under £1000</option>
                            <option value="Mid">£1000 - £10,000</option>
                            <option value="Upper">£10,000+</option>
                        </select> <br><br>

                        <label for="Q3">Do you pay rent?:</label>

                        <select name="Q3" id="Q3">
                            <option value=True>Yes</option>
                            <option value=False>No</option>
                        </select> <br><br>

                        <label for="Q4">What part of the UK do you live?:</label>

                        <select name="Q4" id="Q4">
                            <option value="England">England</option>
                            <option value="Scotland">Scotland</option>
                            <option value="Wales">Wales</option>
                            <option value="Nothern Ireland">Nothern Ireland</option>
                        </select> <br><br>

                        <label for="Q5">What part of the Country do you live?:</label>

                        <select name="Q5" id="Q5">
                            <option value="Capital">The Capital City</option>
                            <option value="Major">A Major City</option>
                            <option value="Small">A Smaller City</option>
                            <option value="Outskirt">The Outskirts Of A City</option>
                            <option value="Countryside">The Countryside</option>

                        </select> <br><br>


                        

                    
                    
                </form>
                <div class="center" id="hiddenSection">
                    <p id="hiddenParagraph"></p>
                </div>
            </section>
        </main>
    </body>
</html>
