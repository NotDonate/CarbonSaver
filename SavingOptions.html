<!DOCTYPE html>

<html>



<head>
    <title>
        Carbon Saver

<!--CSS contained in the style tag, some inline styling done within html tags-->
<style>
    *{
    text-decoration: none; border-radius: 5px;
    }
    body{
        height: auto;
    }
    header{
        text-align: center; background-color: green; font-size: large; padding: 5%; border-radius: 0px;
    }


    /* This is the CSS for the navigation bar */
    .navigationbar{
        background: linear-gradient(to right, green, cyan); border-radius: 0px;
    }
    .navigationbardiv{
        display: flex; align-items: center; justify-content: flex-end; padding-right: 15px;
    }
    .options{
        list-style: none; display: inline-block; padding-left: 10px; padding-right: 10px; font-size: larger;
        font-weight: bold;
    }

    /* This is the CSS for the main body's structure */
    .container{
        display: flex; height: auto;
    }
    /* Left side structure */
    .leftside{
        width: 25%; height: auto; min-height: 500px; 
    }

    /* Right side structure */
    .rightside{
        width: 75%; height: auto; min-height: 500px;
    }

</style>
</head>



<body>

    <header>
        Logo
    </header>

    <nav class="navigationbar">
        <div class="navigationbardiv">
            <ul>
                <li class="options"><a href="#" style="color: white;">Option1</a></li>
                <li class="options"><a href="#" style="color: white;">Option2</a></li>
                <li class="options"><a href="#" style="color: white;">Option3</a></li>
                <li class="options"><a href="#" style="color: white;">Option4</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">

        <div class="leftside">
            <div style="border: 1px solid black; min-height: 200px; width: 90%; margin: auto; margin-top: 10%; height: auto;">
                <header style="font-weight: bold;">Purpose of this page</header>
                <ul>
                    <li>1</li>
                </ul>
            </div>
            <div style="border: 1px solid black; min-height: 120px; width: 90%; margin: auto; margin-top: 10%; margin-bottom: 10%; height: auto;">
                <header style="font-weight: bold;">Not Recommended</header>
            </div>
        </div>

        <div class="rightside">
            <div style="border: 1px solid black; min-height: 220px; width: 90%; margin: auto; margin-top: 5%; margin-bottom: 5%; height: auto;">
                <header style="font-weight: bold;">Recommended</header>
            </div>
        </div>

    </div>

</body>



</html>
