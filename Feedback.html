<h1>Share your feedback with us!</h1>
<h2>Enter the details here:</h2>
<form>
  <label for="name">Name</label>
  <input type="text" id="name" name="name" required />
  
  <label for="email">Email</label>
  <input type="email" id="email" name="email" required />
  
  <label for="message">Message</label>
<textarea id="message" name="message" required></textarea>
<p id="error" style="color:red; display:none;">Please enter a message.</p>

<button type="button" class="btn" onclick="validateForm()">Send</button>

<script>
function validateForm() {
    const input = document.getElementById("message");
    const error = document.getElementById("error");

    if (input.value.trim() === "") {
        error.style.display = "block";
    } else {
        error.style.display = "none";
        alert("Form submitted!");
        sendEmail();  //email message
    }
}
</script>


<p>Click the "Send" button and the information will be sent to us.</p>
<P>Note: The Name and Email boxes are optional.</P>
<script type="text/javascript" src="script.js"></script>
